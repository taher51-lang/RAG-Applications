<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NyayaSetu — Indian Legal Research Assistant</title>
  <meta name="description" content="NyayaSetu detects conflicts between Supreme Court of India judgments using AI-powered retrieval-augmented generation." />

  <!-- React 18 + Babel standalone for single-file SPA -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            surface: { 800: '#1a1a2e', 700: '#16213e', 600: '#0f3460', 500: '#1a1a3e' },
            accent:  { DEFAULT: '#e94560', light: '#ff6b6b' },
            gold:    { DEFAULT: '#f5c542', dark: '#d4a017' },
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4,0,0.6,1) infinite',
            'float': 'float 6s ease-in-out infinite',
            'shimmer': 'shimmer 2s linear infinite',
            'fade-in': 'fadeIn .4s ease-out',
            'slide-up': 'slideUp .5s ease-out',
          },
          keyframes: {
            float:   { '0%,100%': { transform: 'translateY(0)' },   '50%': { transform: 'translateY(-8px)' } },
            fadeIn:  { from: { opacity: 0 }, to: { opacity: 1 } },
            slideUp: { from: { opacity: 0, transform: 'translateY(20px)' }, to: { opacity: 1, transform: 'translateY(0)' } },
            shimmer: { '0%': { backgroundPosition: '-200% 0' }, '100%': { backgroundPosition: '200% 0' } },
          },
        },
      },
    };
  </script>

  <!-- Google Font: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background: #0b0b1a; font-family: 'Inter', system-ui, sans-serif; }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(233,69,96,.35); border-radius: 999px; }

    /* Gradient text helper */
    .text-gradient {
      background: linear-gradient(135deg, #e94560 0%, #f5c542 50%, #e94560 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200% auto;
    }

    /* Glass card */
    .glass {
      background: rgba(26, 26, 46, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.06);
    }

    /* Markdown-ish formatting inside answer */
    .answer-text p { margin-bottom: 0.75rem; }
    .answer-text strong { color: #f5c542; font-weight: 600; }
    .answer-text ul, .answer-text ol { padding-left: 1.25rem; margin-bottom: 0.75rem; }
    .answer-text li { margin-bottom: 0.35rem; }
    .answer-text em { color: #a5b4fc; }

    /* Shimmer bar for loading */
    .shimmer-bar {
      background: linear-gradient(90deg, rgba(233,69,96,0.08) 25%, rgba(233,69,96,0.22) 50%, rgba(233,69,96,0.08) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.6s linear infinite;
    }

    /* Timeline styles */
    .timeline-gradient {
      background: linear-gradient(90deg, rgba(99,102,241,0.12) 0%, rgba(233,69,96,0.12) 50%, rgba(245,158,11,0.12) 100%);
    }
    .timeline-arrow-line {
      position: relative;
      height: 3px;
      border-radius: 999px;
    }
    .timeline-arrow-line::after {
      content: '';
      position: absolute;
      right: -1px;
      top: 50%;
      transform: translateY(-50%);
      border: 6px solid transparent;
      border-left-width: 10px;
    }
    .timeline-arrow-red    { background: rgba(239,68,68,0.5); }
    .timeline-arrow-red::after    { border-left-color: rgba(239,68,68,0.7); }
    .timeline-arrow-orange { background: rgba(249,115,22,0.5); }
    .timeline-arrow-orange::after { border-left-color: rgba(249,115,22,0.7); }
    .timeline-arrow-green  { background: rgba(16,185,129,0.5); }
    .timeline-arrow-green::after  { border-left-color: rgba(16,185,129,0.7); }

    @keyframes arrowPulse {
      0%, 100% { opacity: 0.6; }
      50%      { opacity: 1; }
    }
    .arrow-pulse { animation: arrowPulse 2.5s ease-in-out infinite; }
  </style>
</head>

<body class="dark">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    /* ── API helper ─────────────────────────────────────── */
    const API = "http://localhost:8000";

    async function postQuery(query) {
      const res = await fetch(`${API}/query`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `HTTP ${res.status}`);
      }
      return res.json();
    }

    /* ── Tiny markdown→JSX ──────────────────────────────── */
    function renderMarkdown(text) {
      if (!text) return null;
      // Split into lines, convert bold / italic / bullets
      const html = text
        .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
        .replace(/\*(.+?)\*/g, "<em>$1</em>")
        .replace(/^(\d+)\.\s+/gm, "<br/>$1. ")
        .replace(/^[-•]\s+/gm, "<br/>• ")
        .replace(/\n{2,}/g, "<br/><br/>")
        .replace(/\n/g, "<br/>");
      return <span className="answer-text" dangerouslySetInnerHTML={{ __html: html }} />;
    }

    /* ── Badge component ────────────────────────────────── */
    function ConflictBadge({ type }) {
      if (!type) return null;
      const map = {
        OVERRULES: { bg: "bg-red-500/20",    border: "border-red-500/40",    text: "text-red-400",    dot: "bg-red-400" },
        NARROWS:   { bg: "bg-orange-500/20",  border: "border-orange-500/40",  text: "text-orange-400", dot: "bg-orange-400" },
        AFFIRMS:   { bg: "bg-emerald-500/20", border: "border-emerald-500/40", text: "text-emerald-400",dot: "bg-emerald-400" },
      };
      const s = map[type] || map.AFFIRMS;
      return (
        <span className={`inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold tracking-wide border ${s.bg} ${s.border} ${s.text}`}>
          <span className={`w-1.5 h-1.5 rounded-full ${s.dot} animate-pulse`} />
          {type}
        </span>
      );
    }

    /* ── Timeline summary extraction ───────────────────── */
    function extractSummaries(answer, landmarkCase, citingCase) {
      if (!answer || !landmarkCase || !citingCase) return { landmark: "", citing: "", change: "" };

      // Normalise the answer — collapse whitespace for easier searching
      const text = answer.replace(/\n+/g, " ").replace(/\s+/g, " ");

      function grab(caseName) {
        // Escape regex-special chars in the case name
        const esc = caseName.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        // Try to find 1-2 sentences after the case name mention
        const re = new RegExp(esc + "[^.]*?\\.([^.]*?\\.?)?", "i");
        const m = text.match(re);
        if (m) {
          // Clean up and trim to ~180 chars
          let s = m[0].replace(new RegExp("^" + esc, "i"), "").replace(/^[\s,:\-–—*]+/, "").trim();
          if (s.length > 180) s = s.slice(0, 177) + "…";
          return s || null;
        }
        return null;
      }

      const landmarkSummary = grab(landmarkCase)
        || "Established the foundational legal principle on this issue.";
      const citingSummary = grab(citingCase)
        || "Revisited the earlier position and modified the legal framework.";

      // Derive a short change-line from the conflict type context
      let change = "";
      const lower = text.toLowerCase();
      if (lower.includes("narrows"))   change = "Scope of the earlier ruling was significantly narrowed";
      else if (lower.includes("overrules")) change = "The earlier ruling was expressly overruled";
      else if (lower.includes("affirms"))   change = "The earlier ruling was reaffirmed and upheld";
      // Try to find a more specific line near "conflict" / "however" / "directly"
      const conflictRe = /(?:however|directly conflicts?|significantly)[^.]{10,120}\./i;
      const cm = text.match(conflictRe);
      if (cm) change = cm[0].trim();
      if (change.length > 120) change = change.slice(0, 117) + "…";

      return { landmark: landmarkSummary, citing: citingSummary, change };
    }

    /* ── Legal Evolution Timeline ──────────────────────── */
    function LegalTimeline({ data }) {
      const [open, setOpen] = useState(false);
      if (!data.landmark_case || !data.citing_case) return null;

      const { landmark, citing, change } = extractSummaries(
        data.answer, data.landmark_case, data.citing_case
      );

      const arrowColors = {
        OVERRULES: { line: "timeline-arrow-red",    badge: "bg-red-500/20 border-red-500/40 text-red-400",     dot: "bg-red-400" },
        NARROWS:   { line: "timeline-arrow-orange", badge: "bg-orange-500/20 border-orange-500/40 text-orange-400", dot: "bg-orange-400" },
        AFFIRMS:   { line: "timeline-arrow-green",  badge: "bg-emerald-500/20 border-emerald-500/40 text-emerald-400", dot: "bg-emerald-400" },
      };
      const ac = arrowColors[data.conflict_type] || arrowColors.AFFIRMS;

      return (
        <div className="space-y-3">
          {/* Toggle button */}
          <button
            id="timeline-toggle"
            onClick={() => setOpen(!open)}
            className="flex items-center gap-2 px-4 py-2 rounded-xl glass text-xs font-semibold text-white/50 hover:text-white/80 hover:border-white/10 transition-all duration-200 cursor-pointer group"
          >
            <svg
              className={`w-3.5 h-3.5 transition-transform duration-300 ${open ? "rotate-90" : ""}`}
              fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"
            >
              <path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7" />
            </svg>
            <span className="uppercase tracking-widest">{open ? "Hide Timeline" : "Show Timeline"}</span>
            <span className="text-white/20">— Legal Evolution</span>
          </button>

          {/* Timeline panel */}
          {open && (
            <div className="animate-slide-up glass rounded-2xl p-6 overflow-hidden">
              {/* Section header */}
              <div className="flex items-center gap-2 mb-6">
                <span className="w-1.5 h-7 rounded-full bg-gradient-to-b from-indigo-400 to-orange-400" />
                <span className="text-xs font-semibold uppercase tracking-widest text-white/40">Legal Evolution Timeline</span>
              </div>

              {/* Gradient backdrop */}
              <div className="timeline-gradient rounded-xl p-6 relative">
                {/* Two nodes + arrow */}
                <div className="flex items-stretch gap-0">
                  {/* Left node — Landmark */}
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 mb-2">
                      <span className="w-3 h-3 rounded-full bg-indigo-400 ring-4 ring-indigo-400/20 flex-shrink-0" />
                      <span className="text-[10px] uppercase tracking-widest font-bold text-indigo-300/70">Landmark</span>
                    </div>
                    <div className="ml-1.5 pl-4 border-l-2 border-indigo-400/20">
                      <p className="text-[13px] font-semibold text-white/90 leading-snug mb-1.5">
                        {data.landmark_case}
                      </p>
                      <p className="text-[12px] text-white/45 leading-relaxed">{landmark}</p>
                    </div>
                  </div>

                  {/* Center arrow */}
                  <div className="flex flex-col items-center justify-center px-4 min-w-[120px]">
                    <div className={`w-full ${ac.line} timeline-arrow-line arrow-pulse`} />
                    <div className={`mt-2 inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-[10px] font-bold tracking-wide border ${ac.badge}`}>
                      <span className={`w-1 h-1 rounded-full ${ac.dot}`} />
                      {data.conflict_type || "—"}
                    </div>
                  </div>

                  {/* Right node — Citing */}
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 mb-2 justify-end">
                      <span className="text-[10px] uppercase tracking-widest font-bold text-orange-300/70">Citing</span>
                      <span className="w-3 h-3 rounded-full bg-orange-400 ring-4 ring-orange-400/20 flex-shrink-0" />
                    </div>
                    <div className="mr-1.5 pr-4 border-r-2 border-orange-400/20 text-right">
                      <p className="text-[13px] font-semibold text-white/90 leading-snug mb-1.5">
                        {data.citing_case}
                      </p>
                      <p className="text-[12px] text-white/45 leading-relaxed">{citing}</p>
                    </div>
                  </div>
                </div>

                {/* Change line */}
                {change && (
                  <div className="mt-5 pt-4 border-t border-white/[0.06] text-center">
                    <p className="text-[12px] text-white/35 italic">
                      <span className="text-white/50 not-italic font-medium">What changed:</span>{" "}
                      {change}
                    </p>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ── Case card ──────────────────────────────────────── */
    function CaseCard({ label, caseName, icon }) {
      if (!caseName) return null;
      return (
        <div className="glass rounded-2xl p-5 flex-1 min-w-[240px] transition-all duration-300 hover:border-white/10 hover:shadow-lg hover:shadow-accent/5 group">
          <div className="flex items-center gap-2 mb-3">
            <span className="text-lg">{icon}</span>
            <span className="text-[11px] font-semibold uppercase tracking-widest text-white/40">{label}</span>
          </div>
          <p className="text-sm text-white/80 leading-relaxed font-medium group-hover:text-white transition-colors">
            {caseName}
          </p>
        </div>
      );
    }

    /* ── Response card ──────────────────────────────────── */
    function ResponseCard({ data }) {
      return (
        <div className="animate-slide-up space-y-5">
          {/* Conflict warning */}
          {data.conflict_detected && (
            <div className="flex items-center gap-3 px-5 py-3.5 rounded-xl bg-red-500/10 border border-red-500/25 animate-fade-in">
              <span className="text-xl">⚠️</span>
              <span className="text-red-300 text-sm font-medium">Conflict Detected between judgments</span>
            </div>
          )}

          {/* Answer section */}
          <div className="glass rounded-2xl p-6 space-y-4">
            <div className="flex items-center justify-between flex-wrap gap-3">
              <div className="flex items-center gap-2">
                <span className="w-1.5 h-7 rounded-full bg-gradient-to-b from-accent to-gold" />
                <span className="text-xs font-semibold uppercase tracking-widest text-white/50">Analysis</span>
              </div>
              <ConflictBadge type={data.conflict_type} />
            </div>
            <div className="text-[15px] text-white/75 leading-[1.8]">
              {renderMarkdown(data.answer)}
            </div>
          </div>

          {/* Case cards */}
          {(data.landmark_case || data.citing_case) && (
            <div className="flex flex-wrap gap-4">
              <CaseCard label="Landmark Judgment" caseName={data.landmark_case} icon="⚖️" />
              <CaseCard label="Citing Judgment"   caseName={data.citing_case}   icon="📜" />
            </div>
          )}

          {/* Legal Evolution Timeline */}
          <LegalTimeline data={data} />
        </div>
      );
    }

    /* ── Loading skeleton ───────────────────────────────── */
    function LoadingSkeleton() {
      return (
        <div className="animate-fade-in space-y-4 py-2">
          <div className="flex items-center gap-3 mb-2">
            <div className="w-5 h-5 rounded-full border-2 border-accent/40 border-t-accent animate-spin" />
            <span className="text-sm text-white/40 font-medium">Analyzing Supreme Court judgments…</span>
          </div>
          {[100, 85, 92, 60].map((w, i) => (
            <div key={i} className="shimmer-bar rounded-lg h-4" style={{ width: `${w}%` }} />
          ))}
        </div>
      );
    }

    /* ── Sample query chips ─────────────────────────────── */
    const SAMPLES = [
      "Can contract workers claim permanent employment?",
      "What is the definition of industry?",
      "Do temporary employees have regularization rights?",
    ];

    function SampleChips({ onSelect, disabled }) {
      return (
        <div className="flex flex-wrap gap-2 justify-center">
          {SAMPLES.map((q) => (
            <button
              key={q}
              onClick={() => onSelect(q)}
              disabled={disabled}
              className="px-4 py-2 text-[13px] rounded-full glass text-white/60 hover:text-white hover:border-accent/30 transition-all duration-200 hover:shadow-md hover:shadow-accent/10 disabled:opacity-40 disabled:cursor-not-allowed cursor-pointer"
            >
              {q}
            </button>
          ))}
        </div>
      );
    }

    /* ── Main App ───────────────────────────────────────── */
    function App() {
      const [messages, setMessages] = useState([]);
      const [input, setInput]       = useState("");
      const [loading, setLoading]   = useState(false);
      const [error, setError]       = useState(null);
      const bottomRef               = useRef(null);

      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages, loading]);

      async function handleSend(queryText) {
        const q = (queryText || input).trim();
        if (!q || loading) return;
        setInput("");
        setError(null);
        setMessages((prev) => [...prev, { role: "user", text: q }]);
        setLoading(true);
        try {
          const data = await postQuery(q);
          setMessages((prev) => [...prev, { role: "assistant", data }]);
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      }

      function handleKeyDown(e) {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); }
      }

      const isEmpty = messages.length === 0 && !loading;

      return (
        <div className="min-h-screen flex flex-col text-white relative overflow-hidden">
          {/* Ambient blobs */}
          <div className="fixed inset-0 pointer-events-none overflow-hidden -z-10">
            <div className="absolute -top-40 -left-40 w-[600px] h-[600px] rounded-full bg-accent/[0.04] blur-[120px] animate-float" />
            <div className="absolute -bottom-60 -right-60 w-[700px] h-[700px] rounded-full bg-indigo-600/[0.04] blur-[140px] animate-float" style={{ animationDelay: "3s" }} />
            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] rounded-full bg-gold/[0.02] blur-[100px]" />
          </div>

          {/* Header */}
          <header className="sticky top-0 z-30 glass border-b border-white/[0.04]">
            <div className="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-3">
                <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-accent to-gold flex items-center justify-center text-lg shadow-lg shadow-accent/20">
                  ⚖️
                </div>
                <div>
                  <h1 className="text-lg font-bold tracking-tight">
                    <span className="text-gradient">NyayaSetu</span>
                  </h1>
                  <p className="text-[11px] text-white/30 font-medium -mt-0.5 tracking-wide">Indian Legal Research Assistant</p>
                </div>
              </div>
              <div className="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-500/10 border border-emerald-500/20">
                <span className="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse" />
                <span className="text-[11px] text-emerald-400/80 font-medium">Online</span>
              </div>
            </div>
          </header>

          {/* Chat area */}
          <main className="flex-1 overflow-y-auto">
            <div className="max-w-4xl mx-auto px-6 py-8 space-y-6">

              {/* Empty state */}
              {isEmpty && (
                <div className="flex flex-col items-center justify-center min-h-[60vh] animate-fade-in space-y-8">
                  <div className="relative">
                    <div className="w-20 h-20 rounded-3xl bg-gradient-to-br from-accent/20 to-gold/20 flex items-center justify-center text-4xl border border-white/[0.06] shadow-2xl shadow-accent/10 animate-float">
                      ⚖️
                    </div>
                    <div className="absolute -inset-3 rounded-3xl bg-accent/5 blur-xl -z-10" />
                  </div>
                  <div className="text-center space-y-3">
                    <h2 className="text-3xl font-extrabold tracking-tight">
                      <span className="text-gradient">NyayaSetu</span>
                    </h2>
                    <p className="text-white/40 text-sm max-w-md">
                      AI-powered conflict detection between Supreme Court of India judgments.
                    </p>
                    <p className="text-white/25 text-xs max-w-sm mx-auto leading-relaxed">
                      Covers landmark Supreme Court judgments on employment &amp; labor law
                    </p>
                  </div>
                  <div className="space-y-3">
                    <p className="text-center text-[11px] text-white/25 uppercase tracking-widest font-semibold">Try a sample query</p>
                    <SampleChips onSelect={handleSend} disabled={loading} />
                  </div>
                </div>
              )}

              {/* Messages */}
              {messages.map((msg, i) =>
                msg.role === "user" ? (
                  <div key={i} className="flex justify-end animate-fade-in">
                    <div className="max-w-[80%] px-5 py-3 rounded-2xl rounded-br-md bg-gradient-to-r from-accent/20 to-accent/10 border border-accent/20 text-sm text-white/90 leading-relaxed">
                      {msg.text}
                    </div>
                  </div>
                ) : (
                  <div key={i} className="animate-fade-in">
                    <ResponseCard data={msg.data} />
                  </div>
                )
              )}

              {/* Loading */}
              {loading && <LoadingSkeleton />}

              {/* Error */}
              {error && (
                <div className="flex items-center gap-3 px-5 py-3 rounded-xl bg-red-500/10 border border-red-500/25 animate-fade-in">
                  <span className="text-lg">❌</span>
                  <span className="text-red-300 text-sm">{error}</span>
                </div>
              )}

              <div ref={bottomRef} />
            </div>
          </main>

          {/* Input bar */}
          <footer className="sticky bottom-0 z-30 glass border-t border-white/[0.04]">
            <div className="max-w-4xl mx-auto px-6 py-4">
              {!isEmpty && messages.length > 0 && (
                <div className="mb-3">
                  <SampleChips onSelect={handleSend} disabled={loading} />
                </div>
              )}
              <div className="flex items-center gap-3">
                <div className="flex-1 relative">
                  <input
                    id="query-input"
                    type="text"
                    value={input}
                    onChange={(e) => setInput(e.target.value)}
                    onKeyDown={handleKeyDown}
                    placeholder="Ask about Indian Supreme Court judgments…"
                    disabled={loading}
                    className="w-full px-5 py-3.5 pr-12 rounded-2xl bg-white/[0.04] border border-white/[0.08] text-sm text-white placeholder-white/25 outline-none focus:border-accent/40 focus:ring-2 focus:ring-accent/10 transition-all duration-200 disabled:opacity-50"
                  />
                </div>
                <button
                  id="send-button"
                  onClick={() => handleSend()}
                  disabled={loading || !input.trim()}
                  className="w-12 h-12 rounded-2xl bg-gradient-to-br from-accent to-accent/70 flex items-center justify-center text-white shadow-lg shadow-accent/20 hover:shadow-accent/40 transition-all duration-200 hover:scale-105 active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed disabled:hover:scale-100 cursor-pointer"
                >
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M22 2L11 13" /><path d="M22 2L15 22L11 13L2 9L22 2Z" />
                  </svg>
                </button>
              </div>
              <p className="text-center text-[10px] text-white/15 mt-3">NyayaSetu — Powered by RAG + Gemini • Not legal advice</p>
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
